<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f5f4f1;color:#4e4b48;font-size:13px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#c8c3bb;border-radius:3px}
.hdr{background:#2c2925;color:#f5f4f1;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:relative}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:.3px}.hdr small{font-size:8px;letter-spacing:5px;opacity:.4;display:block;text-transform:uppercase}
.cnt{max-width:1500px;margin:0 auto;padding:16px 20px}
.tabs{display:flex;gap:0;border-bottom:2px solid #2c2925;margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 18px;border:none;cursor:pointer;background:transparent;color:#8a8680;font-weight:500;font-size:12px;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:all .15s}
.tab.on{background:#2c2925;color:#f5f4f1;font-weight:700;border-bottom-color:#c9a96e}
.pnl{display:none}.pnl.on{display:block}
.flt{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.flt input,.flt select{padding:8px 12px;border-radius:6px;border:1px solid #d5d0c8;font-size:12px;font-family:inherit;background:#fff}
.flt input{flex:1;min-width:180px}.flt select{max-width:250px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:#eae7e1;position:sticky;top:0;z-index:2}
th{padding:6px 5px;text-align:left;font-weight:600;color:#6b6560;border-bottom:2px solid #d5d0c8;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#ddd8d0}
th .arrow{font-size:8px;margin-left:2px;opacity:.4}
th.sorted .arrow{opacity:1;color:#c9a96e}
td{padding:4px 5px;border-bottom:1px solid #eae7e1}
.r{text-align:right}.mn{font-family:'DM Sans',monospace;font-size:10px}.g{color:#2d7a3a}.gy{color:#b0a99f}.b{font-weight:700}
.ck:hover{background:#f0ede7}.ck{cursor:pointer}
.bg{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;display:inline-block}
.bg-d{background:#e8dff5;color:#6b3fa0}.bg-n{background:#dde8f0;color:#2a5a7e}
.bg-s{background:#d4edda;color:#1b5e29;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600}
.bg-f{background:#f8d7da;color:#721c24;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600}
.bg-w{background:#fff3cd;color:#856404;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600}
.bg-i{background:#d1ecf1;color:#0c5460;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600}
.dp{margin-top:16px;background:#faf9f7;border-radius:10px;padding:16px;border:1px solid #d5d0c8}
.rs{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.cd{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e5e1db;text-align:center}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.gb{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.gbtn{padding:6px 14px;border-radius:6px;border:1px solid #2c2925;background:#2c2925;color:#f5f4f1;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.gbtn.on{border-color:#b0a99f;background:#fff;color:#2c2925}
.mb{height:5px;background:#e5e1db;border-radius:3px;overflow:hidden;width:70px;display:inline-block}
.mf{height:100%;border-radius:3px}
.scroll-wrap{max-height:75vh;overflow:auto;border:1px solid #e5e1db;border-radius:8px}
.ml-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:2px}
.ml-0{background:#d4edda}.ml-low{background:#fff3cd}.ml-high{background:#f8d7da}
/* Letter */
.lt{background:#fff;border:1px solid #d5d0c8;overflow:hidden;max-width:760px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.lt-top{background:#2c2925;padding:24px 32px;display:flex;justify-content:space-between;align-items:center}
.lt-logo{font-size:9px;letter-spacing:6px;color:#c9a96e;text-transform:uppercase;font-weight:700}
.lt-date{font-size:11px;color:#a09a92}
.lt-body{padding:28px 32px;color:#4e4b48}
.lt-greeting{font-size:20px;font-weight:700;margin-bottom:16px;color:#2c2925}
.lt-intro{font-size:12px;line-height:1.7;margin-bottom:24px;color:#6b6560}
.lt-info{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#e5e1db;margin-bottom:24px;border:1px solid #e5e1db}
.lt-info-item{padding:10px 14px;background:#faf9f7}
.lt-info-label{font-size:8px;color:#a09a92;font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
.lt-info-val{font-size:13px;font-weight:600;color:#2c2925;margin-top:2px}
.lt-kpi{margin-top:14px;border:1px solid #e5e1db;border-radius:6px;overflow:hidden;margin-bottom:20px}
.lt-kpi-head{background:#faf9f7;padding:6px 14px;font-size:9px;font-weight:700;color:#8a8680;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #e5e1db;display:grid;grid-template-columns:1fr 60px 60px 60px 24px;gap:4px}
.lt-kpi-row{padding:5px 14px;font-size:11px;border-bottom:1px solid #f0ede7;display:grid;grid-template-columns:1fr 60px 60px 60px 24px;gap:4px;align-items:center}
.lt-section{margin-bottom:14px;border:1px solid #e5e1db;border-radius:6px;overflow:hidden}
.lt-sec-head{background:#faf9f7;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e5e1db}
.lt-sec-num{font-size:10px;font-weight:800;color:#c9a96e;margin-right:6px}
.lt-sec-title{font-size:12px;font-weight:700;color:#2c2925}
.lt-sec-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px}
.lt-sec-body{padding:10px 14px}
.lt-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px}
.lt-row-label{color:#8a8680;font-weight:500}.lt-row-val{font-weight:600;color:#2c2925}
.lt-row-cur{color:#a09a92;font-size:9px;margin-right:3px}
.lt-total{background:#2c2925;color:#f5f4f1;padding:20px 32px;display:flex;justify-content:space-between;align-items:center}
.lt-total-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#a09a92}
.lt-total-val{font-size:26px;font-weight:800;color:#c9a96e}
.lt-total-pct{font-size:11px;color:#a09a92;margin-top:2px}
.lt-footer{padding:14px 32px;font-size:9px;color:#b0a99f;text-align:center;border-top:1px solid #e5e1db;line-height:1.5}
.sr{background:#fff;border:1px solid #e5e1db;border-radius:6px;margin-top:4px;max-height:200px;overflow:auto}
.si{padding:6px 14px;cursor:pointer;border-bottom:1px solid #f0ede7;font-size:12px}.si:hover{background:#f0ede7}
.tg-h th{padding:8px 6px;text-align:center;background:#2c2925;color:#f5f4f1;font-weight:600;font-size:9px;cursor:default}
.tg-h th:first-child{text-align:left;font-size:11px}
.tg-d td{padding:6px;text-align:center;border-bottom:1px solid #e5e1db}
.tg-d td:first-child{text-align:left;font-weight:600;white-space:nowrap;color:#2c2925;font-size:11px}
.tb{width:34px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;transition:background .2s}
.tb.x{background:#2d7a3a}.tb.o{background:#d5d0c8}
.tk{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.tb.x .tk{left:17px}.tb.o .tk{left:3px}
.st th{padding:8px;text-align:left;background:#2c2925;color:#f5f4f1;font-weight:600;white-space:nowrap;cursor:default}
.sc{background:#f0ede7;padding:2px 5px;border-radius:3px;font-size:10px;font-family:monospace}
.sb2{background:#e8dff5;color:#6b3fa0;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600}
.nb{margin-top:20px;background:#faf9f7;border-radius:10px;padding:16px;border:1px solid #e5e1db}
.wb{margin-top:20px;background:#fff8e1;border:1px solid #c9a96e;border-radius:6px;padding:14px}
.wg{background:#fff;border:1px solid #e5e1db;border-radius:10px;padding:14px;margin-bottom:12px}
.wg-title{font-size:10px;font-weight:700;color:#8a8680;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.wg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.wg-item{text-align:center;padding:10px 6px;background:#faf9f7;border-radius:6px}
.wg-val{font-size:20px;font-weight:800}
.wg-label{font-size:9px;color:#8a8680;margin-top:2px}
.wg-bar{height:4px;background:#e5e1db;border-radius:2px;margin-top:4px;overflow:hidden}
.wg-bar-fill{height:100%;border-radius:2px}
.cfg-row{display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid #f0ede7}
.cfg-label{font-size:12px;font-weight:600;color:#2c2925;width:200px}
.cfg-input{padding:6px 10px;border:1px solid #d5d0c8;border-radius:4px;width:60px;font-size:12px;font-family:inherit;text-align:center}
/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:#2c2925;padding:10px 24px;display:flex;justify-content:flex-end;align-items:center;gap:12px;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.15);transform:translateY(100%);transition:transform .25s ease}
.save-bar.show{transform:translateY(0)}
.save-bar .save-msg{font-size:12px;color:#a09a92}
.save-btn{padding:8px 24px;border-radius:6px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.save-btn-primary{background:#c9a96e;color:#2c2925}.save-btn-primary:hover{background:#d4b87d}
.save-btn-secondary{background:transparent;color:#a09a92;border:1px solid #555}.save-btn-secondary:hover{color:#f5f4f1}
/* Buttons */
.exp-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.exp-btn{padding:7px 16px;border-radius:6px;border:1px solid #c9a96e;background:#fff;color:#c9a96e;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.exp-btn:hover{background:#c9a96e;color:#fff}
.exp-btn.primary{background:#2c2925;color:#c9a96e;border-color:#2c2925}
.exp-btn.primary:hover{background:#3d3a36}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  .hdr,.tabs,.flt,.exp-bar,.gb,.no-print,.save-bar{display:none!important}.lt{box-shadow:none;border:none;max-width:100%}.cnt{padding:0}
  /* When print-letter: hide everything except letter panel */
  body.print-letter .pnl{display:none!important}
  body.print-letter #p1{display:block!important}
  body.print-letter #p1 .no-print{display:none!important}
  body.print-letter .lt{page-break-inside:avoid}
}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;flex-direction:column;justify-content:space-between;height:100%">
    <div><small>Boggi Milano</small><h1>Sistema Incentivazione Rete Vendita</h1></div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
      <button onclick="saveSession()" style="font-size:9px;padding:2px 8px;background:#4a7c59;color:#fff;border:1px solid #3a6349;border-radius:4px;cursor:pointer" title="Salva tutto lo stato corrente in un file">&#128190; Salva</button>
      <button onclick="document.getElementById('loadSessionFile').click()" style="font-size:9px;padding:2px 8px;background:#5b6abf;color:#fff;border:1px solid #4a59a0;border-radius:4px;cursor:pointer" title="Carica stato da file salvato in precedenza">&#128194; Carica</button>
      <input type="file" id="loadSessionFile" accept=".json" style="display:none" onchange="loadSession(this)">
      <span style="font-size:9px;opacity:.25">v4.6</span>
    </div>
  </div>
  <!-- MODE SELECTOR: centered -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;position:absolute;left:50%;transform:translateX(-50%)">
    <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a09a92;margin-bottom:2px">Modalità Premio</div>
    <div style="display:flex;gap:6px">
      <!-- MENSILE: active -->
      <button id="modeMensile" onclick="setPrizeMode('mensile')" style="display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;border:1px solid #c9a96e;background:#c9a96e;color:#2c2925;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s">
        <span style="font-size:12px">📅</span> Mensile
      </button>
      <!-- FC + VM: locked -->
      <button id="modeFcVm" disabled title="Disponibile in una versione futura" style="display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;border:1px solid #4e4b48;background:transparent;color:#6b6560;font-size:11px;font-weight:600;cursor:not-allowed;font-family:inherit;opacity:.6">
        <span style="font-size:10px">🔒</span> FC + VM
      </button>
      <!-- SEASONAL BONUS: active -->
      <button id="modeSeasonal" onclick="setPrizeMode('seasonal')" style="display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;border:1px solid #4e4b48;background:transparent;color:#6b6560;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s">
        🏆 Seasonal Bonus
      </button>
    </div>
  </div>
  <!-- RIGHT CONTROLS -->
  <div style="text-align:right;margin-left:auto">
    <div style="font-size:12px;font-weight:600" id="hdrPeriod"></div>
    <div style="font-size:10px;opacity:.5" id="hs"></div>
    <div style="display:flex;gap:4px;margin-top:4px">
      <button class="gbtn" id="modeP" style="font-size:10px;padding:3px 10px">Preventivo</button>
      <button class="gbtn on" id="modeC" style="font-size:10px;padding:3px 10px">Consuntivo</button>
    </div>
    <div style="display:flex;gap:4px;margin-top:3px">
      <button class="gbtn on" id="regInt" style="font-size:10px;padding:3px 10px">Internazionale</button>
      <button class="gbtn" id="regIt" style="font-size:10px;padding:3px 10px">Italia</button>
    </div>
    <!-- Seasonal sub-toggle: visible only in seasonal mode -->
    <div id="seasonPeriodRow" style="display:none;gap:4px;margin-top:3px">
      <button id="seasonTotale" class="gbtn on" onclick="setSeasonPeriod('semestrale')" style="font-size:10px;padding:3px 10px">Totale</button>
      <button id="seasonMidSeason" class="gbtn" onclick="setSeasonPeriod('mid')" style="font-size:10px;padding:3px 10px">Mid-season</button>
    </div>

  </div>
</div>
<div class="cnt"><div class="tabs" id="tabs"></div>
<div class="pnl on" id="p0"></div><div class="pnl" id="p1"></div><div class="pnl" id="p2"></div><div class="pnl" id="p5"></div><div class="pnl" id="p7"></div><div class="pnl" id="p6"></div><div class="pnl" id="p3"></div><div class="pnl" id="p4"></div>
</div>
<!-- Save bar (hidden until changes) -->
<div class="save-bar" id="saveBar">
<span class="save-msg">Modifiche non salvate</span>
<button class="save-btn save-btn-secondary" onclick="discardChanges()">Annulla</button>
<button class="save-btn save-btn-primary" onclick="saveConfig()">&#128190; Salva Configurazione</button>

var USA_STORES=D.us||[1321,1322,1323];
function isUSA(si,e){if(e&&e.cu==="USD")return true;return USA_STORES.indexOf(Number(si))>=0}
var USA_DATA=D.usa||{};// matricola -> {cm, ps, st, sb, tp}
// USA params per role: noTargetMult=% when target NOT hit, useStore=toggle store vs personal
var USA_P={
  "SM":{noTargetMult:0.4,targetMult:1.0,useStore:true},"VSM":{noTargetMult:0.4,targetMult:1.0,useStore:true},
  "SSAP":{noTargetMult:0.4,targetMult:1.0,useStore:false},"SSA":{noTargetMult:0.4,targetMult:1.0,useStore:false},
  "SA":{noTargetMult:0.4,targetMult:1.0,useStore:false},"JSA":{noTargetMult:0.4,targetMult:1.0,useStore:false},
  "SCS":{noTargetMult:0.4,targetMult:1.0,useStore:false},"STK":{noTargetMult:0.4,targetMult:1.0,useStore:true}
};

// calcUSA: commission% from anagrafica (ud.cm). Base from role toggle (store or personal).
// Target hit -> 100% commission. Not hit -> noTargetMult%. No esubero for USA.
function calcUSA(e){
  var ud=USA_DATA[e.m];if(!ud)return 0;
  var sid=String(e.si),tg=D.t[sid],cn=D.c[sid];
  var cm=ud.cm||0;

  var storeHit=false;
  if(MODE==="preventivo"){storeHit=true}
  else if(tg&&cn){var pct=tg.to>0?cn.sc/tg.to:0;storeHit=pct>=PARAMS.bdg100}
  else{storeHit=ud.sb===1}

  var job=e.f||e.j||"";
  var rp=USA_P[job]||{noTargetMult:0.4,targetMult:1.0,useStore:false};
  // USA Dept Stores: forza store sales a prescindere dal job title
  var usaDept=ud.isDept||(STORE_FLAGS[String(e.si)]&&STORE_FLAGS[String(e.si)].usaDept);
  var useStoreSales=rp.useStore||usaDept;

  var base;
  if(useStoreSales){
    base=MODE==="preventivo"?(tg?tg.to:ud.st||0):(cn?cn.sc:ud.st||0);
  }else{
    base=ud.ps||0;
    if(MODE==="preventivo"&&base===0){base=0} // preventivo USA: non stimiamo
  }

  var mult=storeHit?rp.targetMult:rp.noTargetMult;
  return Math.round(base*cm*mult*100)/100;

function getEffectiveJob(e){

    if(sf.noDig)return"SCS NO DIGITAL";

  if(sf.noSy||sf.noPriv){

function seasGetMolt(table, val){
  // JSON.stringify converts ±Infinity to null — treat null/>=999999 as +Infinity, null/<=-999999 as -Infinity
  for(var i=0;i<table.length;i++){
    var r=table[i];
    var lo=r.from;var hi=r.to;
    if(lo===null||lo<=-999999)lo=-Infinity;
    if(hi===null||hi>=999999)hi=Infinity;
    if(lo===-Infinity){if(val<=hi)return r.coeff;}
    else if(hi===Infinity){if(val>lo)return r.coeff;}
    else if(val>lo&&val<=hi)return r.coeff;
  }
  return 0;
}

function seasMoltInventario(inv){
  // (stessa logica di seasMoltInventarioV — usata in rCSeasonal tabella)
  var tbl2=SEAS_CFG.molt_inventario.slice().sort(function(a,b){
    var fa=(a.from==null||a.from<=-999999)?-Infinity:Number(a.from);
    var fb=(b.from==null||b.from<=-999999)?-Infinity:Number(b.from);
    return fa-fb;
  });
  var coeff2=tbl2[0]?tbl2[0].coeff:0;
  for(var i=0;i<tbl2.length;i++){
    var lo2=(tbl2[i].from==null||tbl2[i].from<=-999999)?-Infinity:Number(tbl2[i].from);
    if(inv>=lo2) coeff2=tbl2[i].coeff;
    else break;
  }
  return coeff2;
}
function seasMoltInventarioV(inv){
  // inv = valore raw di "Difference on Cogs" dal file (es. -0.0066 = -0,66%)
  // Fasce raw: < -0.005 → 0.00 | -0.005…-0.002 → 0.50 | -0.002…-0.0015 → 0.80 | ≥ -0.0015 → 1.00
  // Equivalenti in %:  < -0,50%           | -0,50%…-0,20%              | -0,20%…-0,15%               | ≥ -0,15%
  // Ordina le fasce per 'from' crescente (-Inf → +Inf) e prende il coeff
  // dell'ultima fascia il cui 'from' è ≤ inv
  var tbl=SEAS_CFG.molt_inventario.slice().sort(function(a,b){
    var fa=(a.from==null||a.from<=-999999)?-Infinity:Number(a.from);
    var fb=(b.from==null||b.from<=-999999)?-Infinity:Number(b.from);
    return fa-fb; // crescente
  });
  var coeff=tbl[0]?tbl[0].coeff:0; // default = coeff della fascia più bassa
  for(var i=0;i<tbl.length;i++){
    var lo=(tbl[i].from==null||tbl[i].from<=-999999)?-Infinity:Number(tbl[i].from);
    if(inv>=lo) coeff=tbl[i].coeff;
    else break;
  }
  return coeff;
}

// Compute seasonal consuntivo values automatically from D.c / D.t store data
// Returns {scost, inv, sy_pct, sr_pct, sas_pct, acc_pct}
function seasAutoData(e){
  var sid=String(e.si);
  // Usa SEAS_TARGETS per i target seasonal KPI (importati da file dedicato)
  // Fallback su D.t (mensile) se non disponibili
  var stg=SEAS_TARGETS[sid]||{};
  var tg=D.t&&D.t[sid]?D.t[sid]:{};
  // D.cs = consuntivi seasonal (separati da D.c mensile)
  var cn=D.cs&&D.cs[sid]?D.cs[sid]:{};

  // Target seasonal: priorità a SEAS_TARGETS, fallback su D.t mensile
  var seas_to  = stg.to  !== undefined ? stg.to  : (tg.to  || 0);
  var seas_sy  = stg.sy  !== undefined ? stg.sy  : (tg.sy  || 0);
  var seas_pr  = stg.pr  !== undefined ? stg.pr  : (tg.pr  || 0);
  var seas_sas = stg.sas !== undefined ? stg.sas : (SEAS_CFG.sasMaxHours || 4);
  var seas_acc = stg.acc !== undefined ? stg.acc : 0.99;

  // Scostamento fatturato %: usa target seasonal
  var scost=0;
  if(seas_to>0&&cn.sc!==undefined){scost=((cn.sc+(cn.es||0))/seas_to-1)*100;}
  // Incidenza inventariale: usa cn.iv (% diretta da file inventory) se disponibile,
  // altrimenti calcola da esubero assoluto cn.es / fatturato cn.sc
  // inv = valore con segno originale di Difference on Cogs in %
  // Negativo = merce mancante (perdita). Più negativo = peggio.
  // Fasce: < -0.50% → 0.00 | -0.50…-0.20% → 0.50 | -0.20…-0.15% → 0.80 | ≥ -0.15% → 1.00
  // inv = Difference on Cogs dal file, valore raw con segno (es. 0.00558 o -0.00254)
  // Positivo = eccedenza, Negativo = perdita. Confrontato direttamente con soglie in stessa scala.
  var inv=0;
  if(cn.iv!==undefined&&cn.iv!==null){
    inv=cn.iv; // valore grezzo dal file: 0.00558 = 0.558% di eccedenza, -0.00254 = 0.254% di perdita
  } else {
    var stFat=cn.sc!==undefined?cn.sc:0;
    if(stFat>0&&cn.es!==undefined&&cn.es!==0){inv=-(Math.abs(cn.es)/stFat);}
  }

  // KPI % raggiungimento con target seasonal
  // SY: consuntivo SY vs target SY seasonal
  var sy_pct=0;
  if(seas_sy>0&&cn.sy!==undefined){sy_pct=(cn.sy/seas_sy)*100;}
  // SR (Subscription Rate): usa cn.nf (subscription rate consuntivo)
  var sr_pct=0;
  if(seas_pr>0&&cn.nf!==undefined){sr_pct=(cn.nf/seas_pr)*100;}
  // SAS: raggiunto se ore medie < target ore (meno è meglio) → binarizzato 100/0
  var sas_pct=0;
  if(cn.s4!==undefined){sas_pct=cn.s4<seas_sas?100:0;}
  // ACC (Accuracy): usa cn.av (accuracy value da file inventory) se disponibile
  var acc_pct=0;
  if(cn.av!==undefined&&cn.av!==null){
    acc_pct=(cn.av/seas_acc)*100; // cn.av decimale (es. 0.945)
  } else if(seas_acc>0&&cn.nf!==undefined){
    acc_pct=(cn.nf/seas_acc)*100;
  }

  return {
    scost:scost, inv:inv,
    sy_pct:sy_pct, sr_pct:sr_pct, sas_pct:sas_pct, acc_pct:acc_pct,
    // CR per sbarramento mid-season
    cr_actual: cn.cr!==undefined&&cn.cr!==null ? cn.cr : null,
    cr_target: stg.cr!==undefined&&stg.cr!==null ? stg.cr : null,
    // Esponi anche i target usati per il rendering della lettera
    seas_to:seas_to, seas_sy:seas_sy, seas_pr:seas_pr, seas_sas:seas_sas, seas_acc:seas_acc
  };
}

// === MID-SEASON CALC ===
// Premio anticipato a metà stagione (3 mesi su 6):
// - Sbarramento: fatturato ≥ target AND CR ≥ target CR → se no: 0
// - Preventivo: max erogabile = base * 0.30 * sum(kpi pesi attivi) — senza boost
// - Consuntivo: base * 0.30 * kpi score raggiunto — senza boost
// - KPI inventario (inv / molt_inventario) ESCLUSI (m2 = 1 sempre)
// - Riduce il totale seasonal (viene detratto in calcSeasonal quando SEAS[e.m].midPaid > 0)
function calcMidSeason(e){
  if(isD(e.si)) return 0; // dept store: logica separata, no mid-season
  var rlSem=(e.rl||0)*6;
  var base=rlSem*SEAS_CFG.basePct;
  var kpiSet=seasGetKpiSet(e);
  var isP=MODE==="preventivo";

  // Sbarramento fatturato + CR
  if(!isP){
    var auto=seasAutoData(e);
    var fatOk=(auto.scost>=0); // scost = (cons/target - 1)*100 ≥ 0 → fatturato ≥ target
    var crOk=true; // default: se CR non disponibile, non blocca
    if(auto.cr_target!==null&&auto.cr_actual!==null){
      crOk=(auto.cr_actual>=auto.cr_target);
    }
    if(!fatOk||!crOk) return 0;
    // Calcola KPI score raggiunto (senza inventario, m2=1)
    var kpiScore=0;
    kpiSet.forEach(function(kdef){
      if(!seasKpiActive(kdef.k,e)) return;
      if(seasIsKpiAchieved(kdef,auto)) kpiScore+=kdef.weight;
    });
    return Math.round(base*0.30*kpiScore*100)/100;
  } else {
    // Preventivo: mostra il massimo erogabile (tutti i KPI a target, nessun boost)
    var kpiScoreMax=0;
    kpiSet.forEach(function(kdef){
      if(!seasKpiActive(kdef.k,e)) return;
      kpiScoreMax+=kdef.weight;
    });
    return Math.round(base*0.30*kpiScoreMax*100)/100;
  }
}


function seasGetKpiSet(e){
  var sf=STORE_FLAGS[String(e.si)]||{};
  if(sf.noSas) return SEAS_CFG.kpi_nosas;
  if(sf.noAcc) return SEAS_CFG.kpi_noacc;
  return SEAS_CFG.kpi;
}
function seasKpiActive(kdefKey, e){
  // Returns false if this KPI is disabled for this store
  var sf=STORE_FLAGS[String(e.si)]||{};
  if(kdefKey==="sas" && sf.noSas) return false;
  if(kdefKey==="acc" && sf.noAcc) return false;
  return true;
}
// Centralised seasonal KPI achievement logic:
// SAS: lower is better (result must be < sasMaxHours → already binarised to 100/0 in seasAutoData)
// All other KPIs: result >= target (pct >= threshold*100)
function seasIsKpiAchieved(kdef, auto){
  var pct=(auto[kdef.k+"_pct"]||0);
  // For SAS, sas_pct is already binarised to 100 (achieved) or 0 (not achieved)
  // so the standard >= check works correctly. No special case needed here.
  return pct>=kdef.threshold*100;
}
function calcSeasonal(e){
  if(isD(e.si)){
    var bdg6=Math.round((e.ib||0)*6*100)/100;
    return Math.round((bdg6+bdg6*0.5)*100)/100;
  }
  var rlSem=(e.rl||0)*6;
  var base=rlSem*SEAS_CFG.basePct;
  var kpiScore=0;
  var kpiSet=seasGetKpiSet(e);
  var isP=MODE==="preventivo";
  var auto=isP?null:seasAutoData(e);
  kpiSet.forEach(function(kdef){
    if(!seasKpiActive(kdef.k, e)) return;
    var achieved=isP||seasIsKpiAchieved(kdef,auto);
    kpiScore+=kdef.weight*(achieved?1:0);
  });
  var scost=isP?3.01:(auto?auto.scost:0);
  var inv=isP?0:(auto?auto.inv:0);
  var m1=seasMoltTurnover(scost);
  var m2=seasMoltInventarioV(inv);
  var gross=Math.round(base*kpiScore*m1*m2*100)/100;
  // Deduce il mid-season già erogato (se in consuntivo e midPaid registrato)
  var midPaid=(!isP&&SEAS[e.m]&&SEAS[e.m].midPaid>0)?SEAS[e.m].midPaid:0;
  return Math.max(0, Math.round((gross-midPaid)*100)/100);
}

function seasKpiLabel(k){
  for(var i=0;i<SEAS_CFG.kpi.length;i++){if(SEAS_CFG.kpi[i].k===k)return SEAS_CFG.kpi[i].label;}
  return k;
}

// Save ALL PDFs as ZIP with real PDF files
// Strategy: render each letter in an off-screen container using html2canvas tile-by-tile,
// then assemble pages in jsPDF manually — bypassing the viewport-height limit of html2canvas.
function saveAllPDFsZip(){
  if(typeof JSZip==="undefined"){alert("Libreria JSZip non caricata.");return}
  if(typeof html2pdf==="undefined"){alert("Libreria html2pdf non caricata.");return}
  var miss=canProduceLetter();
  if(miss.length>0){alert("Impossibile generare le lettere.\n\nDati mancanti:\n\u2022 "+miss.join("\n\u2022 ")+"\n\nCarica i dati dalla tab Fonti Dati.");return}
  var isSeasonal=PRIZE_MODE==="seasonal";
  var folderName=MODE==="preventivo"?"preventivo":"consuntivo";
  var mm=String(CFG_MONTH).padStart(2,"0");
  var psf=getPdfSubfolder();
  var zip=new JSZip();
  var pool=isSeasonal?E.filter(function(e){return isSMVSM(e);}):E;
  var total=pool.length,done=0;

  // Progress overlay with cancel button
  window._zipCancelled=false;
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1714;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif";
  ov.innerHTML='<div style="background:#2c2925;border:1px solid #55504a;border-radius:14px;padding:36px 48px;text-align:center;min-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.7)">'+
    '<div style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#c9a96e;margin-bottom:10px">Boggi Milano</div>'+
    '<div style="font-size:22px;font-weight:800;color:#ffffff;margin-bottom:6px">Generazione ZIP</div>'+
    '<div style="font-size:13px;color:#c8c3bb;margin-bottom:24px">Rendering PDF in corso...</div>'+
    '<div style="width:100%;height:6px;background:#3d3a36;border-radius:3px;overflow:hidden;margin-bottom:16px"><div id="zipBar" style="width:0%;height:100%;background:#c9a96e;border-radius:3px;transition:width .2s"></div></div>'+
    '<div id="zipCount" style="font-size:13px;color:#e0dbd4;font-weight:600;margin-bottom:24px">0 / '+total+'</div>'+
    '<button onclick="window._zipCancelled=true" style="padding:9px 28px;border-radius:7px;border:1px solid #6b6560;background:transparent;color:#e0dbd4;font-size:12px;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif" onmouseover="this.style.background=\'#3d3a36\'" onmouseout="this.style.background=\'transparent\'">\u2715 Annulla</button>'+
    '</div>';
  document.body.appendChild(ov);

  // Off-screen container — must be in DOM and have real width, but pushed off-left
  // We use a very large height so the browser lays out the full content
  var css=document.querySelector("style").textContent;
  var wrap=document.createElement("div");
  wrap.style.cssText="position:fixed;left:-900px;top:0;width:800px;overflow:visible;z-index:1;background:#fff";
  document.body.appendChild(wrap);

  // A4 at 96dpi: 794×1123px. Scale=2 → canvas is 1588×2246. PDF page in mm: 210×297.
  var PAGE_W_PX=794, SCALE=2;
  var PAGE_W_MM=210, PAGE_H_MM=297;
  var MARGIN_MM=8;
  // Content area in mm
  var CONT_W_MM=PAGE_W_MM-MARGIN_MM*2; // 194mm
  var CONT_H_MM=PAGE_H_MM-MARGIN_MM*2; // 281mm
  // px per mm at scale=2: (794/210)*2 = ~7.562 px/mm
  var PX_PER_MM=(PAGE_W_PX/PAGE_W_MM)*SCALE;
  var PAGE_H_PX_SCALED=Math.round(PAGE_H_MM*PX_PER_MM); // height of one A4 page in canvas px
  var MARGIN_PX_SCALED=Math.round(MARGIN_MM*PX_PER_MM);
  var CONT_H_PX_SCALED=PAGE_H_PX_SCALED-MARGIN_PX_SCALED*2;

  function genNext(i){
    if(window._zipCancelled){
      document.body.removeChild(wrap);
      document.body.removeChild(ov);
      return;
    }
    if(i>=total){
      document.getElementById("zipCount").textContent="Compressione ZIP...";
      zip.generateAsync({type:"blob"}).then(function(blob){
        document.body.removeChild(wrap);
        document.body.removeChild(ov);
        var a=document.createElement("a");a.href=URL.createObjectURL(blob);
        a.download="Lettere_"+folderName+"_"+psf.base+".zip";
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
      });
      return;
    }
    var e=pool[i];
    var fileName=isSeasonal?(e.m+"_"+CFG_SEASON+String(CFG_YEAR).slice(-2)+".pdf"):(e.m+"_"+mm+"_"+CFG_YEAR+".pdf");

    // Render letter HTML into wrap div
    wrap.innerHTML='<style>'+css+'</style>'+
      '<style>*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}'+
      'body,div{font-family:"DM Sans",sans-serif;font-size:13px;color:#4e4b48}'+
      '.lt{max-width:800px;width:800px;box-shadow:none;border:none}</style>'+
      (isSeasonal?buildSeasonalLetterAuto(e):(isUSA(e.si,e)?buildLetterUSA(e):buildLetter(e)));

    // Wait for fonts + layout
    document.fonts.ready.then(function(){
      setTimeout(function(){
        var target=wrap.querySelector(".lt")||wrap;
        var fullH=target.scrollHeight||target.offsetHeight||1200;

        html2canvas(target,{
          scale:SCALE,
          useCORS:true,
          logging:false,
          allowTaint:true,
          backgroundColor:"#ffffff",
          width:PAGE_W_PX,
          height:fullH,
          windowWidth:PAGE_W_PX,
          windowHeight:fullH,
          x:0,y:0,
          scrollX:-wrap.getBoundingClientRect().left,
          scrollY:-wrap.getBoundingClientRect().top
        }).then(function(canvas){
          // Get jsPDF from UMD bundle
          var jsPDFCtor=window.jspdf&&window.jspdf.jsPDF||window.jsPDF;
          var pdf=new jsPDFCtor("portrait","mm","a4");
          var totalCanvasH=canvas.height;
          var pageContentH=CONT_H_PX_SCALED; // canvas px per page content area
          var numPages=Math.ceil(totalCanvasH/pageContentH);

          for(var p=0;p<numPages;p++){
            if(p>0)pdf.addPage();
            var sliceY=p*pageContentH;
            var sliceH=Math.min(pageContentH, totalCanvasH-sliceY);
            // Draw slice to temp canvas
            var tmpC=document.createElement("canvas");
            tmpC.width=canvas.width;
            tmpC.height=sliceH;
            tmpC.getContext("2d").drawImage(canvas, 0,sliceY, canvas.width,sliceH, 0,0, canvas.width,sliceH);
            var imgData=tmpC.toDataURL("image/jpeg",0.95);
            var imgHmm=(sliceH/PX_PER_MM);
            pdf.addImage(imgData,"JPEG", MARGIN_MM,MARGIN_MM, CONT_W_MM, imgHmm);
          }

          var pdfBuf=pdf.output("arraybuffer");
          zip.file(fileName,pdfBuf);
          done++;
          document.getElementById("zipBar").style.width=Math.round(done/total*100)+"%";
          document.getElementById("zipCount").textContent=done+" / "+total;
          setTimeout(function(){genNext(i+1)},80);
        }).catch(function(err){
          console.error("Canvas error for "+e.m+":",err);
          done++;
          document.getElementById("zipBar").style.width=Math.round(done/total*100)+"%";
          document.getElementById("zipCount").textContent=done+" / "+total+" (errore: "+e.m+")";
          setTimeout(function(){genNext(i+1)},80);
        });
      },250);
    });
  }

  document.fonts.ready.then(function(){genNext(0)});
}

  }

  h+='<div class="lt-footer"><div style="white-space:pre-wrap">'+esc(getDiscl(e)||DISCL["INGLESE"])+'</div></div></div>';
  return h;
}

function buildLetter(e){
  var cu=e.cu||"EUR",sid=String(e.si),tg=D.t[sid]||{},cn=D.c[sid]||{},tc=calcE(e),sm=sickMult(e.ml),dp=isD(e.si);
  var _rlLt=e.rl||e.ib||0;var pctSal=_rlLt>0?((tc/_rlLt)*100).toFixed(2):"0";var lang=trLang(e);

function buildSeasonalLetter(e){
  var cu=e.cu||"EUR";
  var isP=MODE==="preventivo";
  var rlSem=(e.rl||0)*6;
  var base=rlSem*SEAS_CFG.basePct;
  var kpiSet=seasGetKpiSet(e);
  var auto=isP?null:seasAutoData(e);
  var lang=trLang(e);
  var T=SEAS_TR[lang]||SEAS_TR["INGLESE"];
  var gr=(T.greeting||{})[lang]||"Hi";

  // In preventivo: tutti i KPI come raggiunti, moltiplicatori al massimo
  var scost=isP?3.01:(auto?auto.scost:0);
  var inv=isP?0:(auto?auto.inv:0);
  var m1=seasMoltTurnover(scost);
  var m2=seasMoltInventarioV(inv);
  var maxM1=seasMoltTurnover(3.01);
  var maxM2=seasMoltInventarioV(0);

// Check if we have enough data to produce letters
function canProduceLetter(){
  var missing=[];
  if(Object.keys(D.tr||{}).length===0)missing.push("Traduzioni (nessuna lingua caricata)");
  if(MODE==="preventivo"){
    if(Object.keys(D.t||{}).length===0)missing.push("Target Fatturato (nessun negozio)");
    // Check individual targets
    var tKeys=Object.keys(D.t||{});
    if(tKeys.length>0){
      if(!tKeys.some(function(k){return(D.t[k].sy||0)>0}))missing.push("Target SY (tutti a zero)");
      if(!tKeys.some(function(k){return(D.t[k].cr||0)>0}))missing.push("Target CR (tutti a zero)");
      if(!tKeys.some(function(k){return(D.t[k].pr||0)>0}))missing.push("Target Privilege (tutti a zero)");
    }
  }
  // Check exchange rates for non-EUR employees
  var hasNonEUR=E.some(function(e){return e.cu&&e.cu!=="EUR"});
  if(hasNonEUR){
    var allOne=E.filter(function(e){return e.cu!=="EUR"}).every(function(e){return e.ex===1||!e.ex});
    if(allOne)missing.push("Cambi Valuta (valute non-EUR con cambio a 1)");
  }
  return missing;
}

function sL(mm){
  var e;for(var i=0;i<E.length;i++){if(E[i].m===mm){e=E[i];break}}if(!e)return;
  if(PRIZE_MODE==="seasonal"){
    document.getElementById("lc").innerHTML=buildSeasonalLetterAuto(e);
    return;
  }
  var miss=canProduceLetter();
  if(miss.length>0){
    alert("Impossibile generare la lettera.\n\nDati mancanti:\n\u2022 "+miss.join("\n\u2022 ")+"\n\nCarica i dati dalla tab Fonti Dati.");
    return;
  }
  document.getElementById("lc").innerHTML=isUSA(e.si,e)?buildLetterUSA(e):buildLetter(e);
}
rL();

  return h;
}

// Helper: sceglie lettera giusta per seasonal (dept vs SM/VSM)
function buildSeasonalLetterAuto(e){
  if(SEASON_PERIOD==="mid") return buildMidSeasonLetter(e);
  return isD(e.si)?buildSeasonalDeptLetter(e):buildSeasonalLetter(e);
}

function buildMidSeasonLetter(e){
  var cu=e.cu||"EUR";
  var isP=MODE==="preventivo";
  var rlSem=(e.rl||0)*6;
  var base=rlSem*SEAS_CFG.basePct;           // RML×6×20%
  var midBase=Math.round(base*0.30*100)/100; // 30% del max KPI semestrale
  var kpiSet=seasGetKpiSet(e);
  var auto=isP?null:seasAutoData(e);
  var lang=trLang(e);
  var T=SEAS_TR[lang]||SEAS_TR["INGLESE"];
  var gr=(T.greeting||{})[lang]||"Hi";
  var stagione=CFG_SEASON+String(CFG_YEAR).slice(-2);

  // KPI score e valori
  var kpiScoreMax=0;
  kpiSet.forEach(function(kdef){
    if(!seasKpiActive(kdef.k,e))return;

  });
  var midMax=Math.round(base*0.30*kpiScoreMax*100)/100; // max erogabile mid

  // Sbarramento (solo consuntivo)
  var sbarOk=true;
  var fatOk=true, crOk=true;

    fatScost=auto.scost||0;
    fatOk=(fatScost>=0);
    crTarget=auto.cr_target;
    crActual=auto.cr_actual;
    if(crTarget!==null&&crActual!==null) crOk=(crActual>=crTarget);

  });

  // KPI total row

  h+='<span style="font-size:10px;font-weight:700;color:#c9a96e;text-transform:uppercase;letter-spacing:1px">'+T.kpi_total+'</span>';
  h+='<span style="font-size:16px;font-weight:800;color:#c9a96e">'+fc(kpiEarned,cu)+'</span>';
  h+='</div>';
  h+='</div>'; // close lt-kpi

  // ── SEZIONE SBARRAMENTO ──
  var sbarCols=isP?'1fr 100px 80px':'1fr 100px 100px 60px 80px';
  h+='<div class="lt-kpi" style="margin-top:16px">';
  h+='<div class="lt-kpi-head" style="background:#2c2925;color:#c9a96e;grid-template-columns:'+sbarCols+';padding:8px 14px">'+
     '<span>SBARRAMENTO</span><span style="text-align:right">'+T.target+'</span>'+
     (isP?'':'<span style="text-align:right">'+T.result+'</span><span style="text-align:right">'+T.var_pct+'</span>')+
     '<span style="text-align:right">STATUS</span></div>';

  // Riga Fatturato
  var storeTgt=stg2.to||0;
  var storeCons=(cn2.sc||0);
  var storeVarPct=storeTgt>0?((storeCons/storeTgt-1)*100):0;
  h+='<div class="lt-kpi-row" style="grid-template-columns:'+sbarCols+'">';

    h+='<span style="text-align:right;font-size:10px;color:#2c2925">'+fc(storeCons,cu)+'</span>';
    h+='<span style="text-align:right;font-size:10px;font-weight:700;color:'+(fatOk?'#2d7a3a':'#cf5b5b')+'">'+fDec(storeVarPct,2)+'%</span>';
  }
  h+='<span style="text-align:right;font-size:16px;font-weight:800;color:'+(isP?'#a09a92':fatOk?'#2d7a3a':'#cf5b5b')+'">'+(isP?'—':fatOk?'\u2713':'\u2717')+'</span>';
  h+='</div>';

  // Riga CR
  var crTgt=crTarget!==null?crTarget:(stg2.cr||null);
  var crRes=crActual!==null?crActual:(cn2.cr||null);

// ==== TAB 2: ANALISI SEASONAL ====
function rASeasonal(){
  var isP=MODE==="preventivo";
  var smvsm=E.filter(function(e){return isSMVSM(e)&&!(SEAS[e.m]&&SEAS[e.m].excluded);});

  // ── Statistiche KPI (tutti i KPI incluso acc, weight=0 incluso per mostrarlo) ──
  var allKpiKeys=["sy","sr","sas","acc"];
  var kpiColors={sy:"#5ba4cf",sr:"#5bb98c",sas:"#d4a94e",acc:"#9b6ec9"};
  var kpiStats={};
  allKpiKeys.forEach(function(k){kpiStats[k]={eligible:0,achieved:0};});

  // Calcolo per ogni SM/VSM
  // In preventivo: tutti KPI come raggiunti, molt max
  function calcSeasonalForAnalysis(e){
    // Dept stores: BDG×6 + QTY (50%), nessun boost
    if(isD(e.si)){
      var bdg6=Math.round((e.ib||0)*6*100)/100;
      return Math.round((bdg6+bdg6*0.5)*100)/100;
    }
    var rlSem=(e.rl||0)*6;
    var base=rlSem*SEAS_CFG.basePct;
    var kpiSet=seasGetKpiSet(e);
    var kpiScore=0;
    var auto=isP?null:seasAutoData(e);
    if(isP){
      kpiSet.forEach(function(kdef){
        if(!seasKpiActive(kdef.k,e))return;
        kpiScore+=kdef.weight;
      });
    } else {
      kpiSet.forEach(function(kdef){
        if(!seasKpiActive(kdef.k,e))return;
        if(seasIsKpiAchieved(kdef,auto)) kpiScore+=kdef.weight;
      });
    }
    var m1=isP?seasMoltTurnover(3.01):seasMoltTurnover(auto?auto.scost:0);
    var m2=isP?seasMoltInventarioV(0):seasMoltInventarioV(auto?auto.inv:0);
    return Math.round(base*kpiScore*m1*m2*100)/100;
  }

  var grandTotal=0,withIncentive=0;
  var m1Dist={no:0,near:0,bdg:0,better:0,over:0,top:0};
  var m2Dist={noBdg:0,halfBdg:0,nearBdg:0,bdg:0};

  smvsm.forEach(function(e){
    var auto=isP?null:seasAutoData(e);
    var ex=e.ex||1;
    var kpiSet=seasGetKpiSet(e);

    // KPI stats
    allKpiKeys.forEach(function(k){
      if(!seasKpiActive(k,e))return;
      var hasKpi=kpiSet.some(function(kd){return kd.k===k;});
      if(!hasKpi)return;
      kpiStats[k].eligible++;
      var achieved=isP||(seasIsKpiAchieved( SEAS_CFG.kpi.find(function(kd){return kd.k===k;})||{k:k,threshold:0.995,weight:0}, auto));
      if(achieved) kpiStats[k].achieved++;
    });

    // Moltiplicatori (solo consuntivo per distribuzione; preventivo tutti top)
    var scost=isP?3.01:(auto?auto.scost:0);
    var inv=isP?0:(auto?auto.inv:0);
    var m1=seasMoltTurnover(scost),m2=seasMoltInventarioV(inv);
    if(m1===0)m1Dist.no++;
    else if(m1===0.8)m1Dist.near++;
    else if(m1===1.0)m1Dist.bdg++;
    else if(m1===1.3)m1Dist.better++;
    else if(m1===1.4)m1Dist.over++;
    else m1Dist.top++;
    if(m2===0)m2Dist.noBdg++;
    else if(m2===0.5)m2Dist.halfBdg++;
    else if(m2===0.8)m2Dist.nearBdg++;
    else m2Dist.bdg++;

    var tot=calcSeasonalForAnalysis(e)*ex;
    grandTotal+=tot;
    if(tot>0)withIncentive++;
  });

  // ── Raggruppamento per negozio o field coach ──
  var aGseas=aG==="fc"?"fc":"store";
  var grp={};
  // Per l'ordinamento per store id, teniamo traccia del si minimo per gruppo
  var grpSi={};
  smvsm.forEach(function(e){
    var auto=isP?null:seasAutoData(e);
    var ex=e.ex||1;
    var key=aGseas==="fc"?(e.fc||"N/A"):e.s;
    var si=Number(e.si)||0;
    if(!grp[key]){
      grp[key]={n:0,tot:0,kpi:{},si:si};
      allKpiKeys.forEach(function(k){grp[key].kpi[k]={ach:0,elig:0};});
    }
    // track min si for this group for sorting
    if(si<grp[key].si)grp[key].si=si;
    grp[key].n++;
    grp[key].tot+=calcSeasonalForAnalysis(e)*ex;
    var kpiSet=seasGetKpiSet(e);
    allKpiKeys.forEach(function(k){
      if(!seasKpiActive(k,e))return;
      var hasKpi=kpiSet.some(function(kd){return kd.k===k;});
      if(!hasKpi)return;
      grp[key].kpi[k].elig++;
      var kdef=SEAS_CFG.kpi.find(function(kd){return kd.k===k;})||{k:k,threshold:0.995,weight:0};
      var achieved=isP||seasIsKpiAchieved(kdef,auto);
      if(achieved) grp[key].kpi[k].ach++;
    });
  });

  var grpArr=[];
  for(var k in grp){grpArr.push({nm:k,n:grp[k].n,tot:grp[k].tot,kpi:grp[k].kpi,av:grp[k].n>0?grp[k].tot/grp[k].n:0,si:grp[k].si});}
  // Ordina per store id crescente (negozio) o alfabetico (fc)
  if(aGseas==="store"){
    grpArr.sort(function(a,b){return a.si-b.si;});
  } else {
    grpArr.sort(function(a,b){return a.nm.toLowerCase()<b.nm.toLowerCase()?-1:1;});
  }
  var mx=1;grpArr.forEach(function(a){if(a.tot>mx)mx=a.tot;});

  // ── Build HTML ──
  var h='<div class="gb">';
  [{k:"store",l:"Per Negozio"},{k:"fc",l:"Per Field Coach"}].forEach(function(g){
    h+='<button class="gbtn'+(aGseas===g.k?" on":"")+'" data-gseas="'+g.k+'">'+g.l+"</button>";
  });

  h+="</div>";

  // Summary cards
  h+='<div class="cg">';
  [{l:"Tot Seasonal"+(isP?" (Max)":""),v:fcEUR(grandTotal),c:"#c9a96e"},
   {l:"SM/VSM",v:smvsm.length,c:"#5ba4cf"},
   {l:"Con Incentivo",v:withIncentive,c:"#2d7a3a"},
   {l:"Senza Incentivo",v:smvsm.length-withIncentive,c:"#cf5b5b"},
   {l:"Media per SM/VSM",v:fcEUR(smvsm.length?grandTotal/smvsm.length:0),c:"#9b6ec9"}
  ].forEach(function(c){
    h+='<div class="cd"><div style="font-size:9px;color:#a09a92;font-weight:600;text-transform:uppercase;letter-spacing:1px">'+c.l+'</div><div style="font-size:18px;font-weight:800;margin-top:3px;color:'+c.c+'">'+c.v+"</div></div>";
  });
  h+="</div>";

  // KPI achievement widget (tutti i KPI, incluso acc)
  h+='<div class="wg"><div class="wg-title">&#127942; '+(isP?"KPI Seasonal — Preventivo (tutti a target)":"Raggiungimento KPI Seasonal")+'</div><div class="wg-grid">';
  allKpiKeys.forEach(function(k){
    var st=kpiStats[k];if(!st||st.eligible===0)return;
    var pct=isP?100:Math.round(st.achieved/st.eligible*100);
    var col=kpiColors[k]||"#8a8680";
    var kdef=SEAS_CFG.kpi.find(function(kd){return kd.k===k;})||{label:k,weight:0};
    h+='<div class="wg-item">';
    h+='<div class="wg-val" style="color:'+col+'">'+pct+'%</div>';
    h+='<div class="wg-label">'+esc(kdef.label||k)+(kdef.weight>0?' ('+st.achieved+'/'+st.eligible+')':'')+'</div>';
    h+='<div style="font-size:9px;color:#a09a92;margin-top:1px">Peso '+Math.round((kdef.weight||0)*100)+'%</div>';
    h+='<div class="wg-bar"><div class="wg-bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>';
    h+='</div>';
  });
  h+="</div></div>";

  // Boost distribution (solo in consuntivo)
  if(!isP){
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">';
    var totSm=smvsm.length||1;

    h+='<div class="wg"><div class="wg-title">&#128200; Moltiplicatore Turnover</div>';
    [{l:"No Bdg (0×)",n:m1Dist.no,c:"#cf5b5b"},{l:"Near Bdg (0.8×)",n:m1Dist.near,c:"#d4a94e"},
     {l:"Bdg (1×)",n:m1Dist.bdg,c:"#8a8680"},{l:"Better (1.3×)",n:m1Dist.better,c:"#5ba4cf"},
     {l:"Over (1.4×)",n:m1Dist.over,c:"#5bb98c"},{l:"Top (1.5×)",n:m1Dist.top,c:"#2d7a3a"}
    ].forEach(function(d){
      if(d.n===0)return;
      var pct=Math.round(d.n/totSm*100);
      h+='<div style="margin-bottom:5px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span style="color:#6b6560">'+d.l+'</span><span style="font-weight:700;color:'+d.c+'">'+d.n+' ('+pct+'%)</span></div>';
      h+='<div style="height:4px;background:#e5e1db;border-radius:2px"><div style="height:4px;width:'+pct+'%;background:'+d.c+';border-radius:2px"></div></div></div>';
    });
    h+='</div>';

    h+='<div class="wg"><div class="wg-title">&#128202; Moltiplicatore Inventario</div>';
    [{l:"No Bdg (0×)",n:m2Dist.noBdg,c:"#cf5b5b"},{l:"Half Bdg (0.5×)",n:m2Dist.halfBdg,c:"#d4a94e"},
     {l:"Near Bdg (0.8×)",n:m2Dist.nearBdg,c:"#8a8680"},{l:"Bdg (1×)",n:m2Dist.bdg,c:"#2d7a3a"}

function _seasMoltTable(tblKey, rows){
  // Per inventario: valori interni raw (es. -0.005), input mostra/salva in % (×100 = -0.50%)
  // Stessa grafica del turnover — celle editabili per from, to e coeff.
  var isInv=(tblKey==="inventario");
  var h='<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px;min-width:440px"><thead><tr style="background:#f5f2ee">';
  h+='<th style="text-align:center;padding:6px 8px;font-weight:700;color:#6b6560">Da (%)</th>';
  h+='<th style="text-align:center;padding:6px 8px;font-weight:700;color:#6b6560">A (%)</th>';
  h+='<th style="text-align:center;padding:6px 10px;font-weight:700;color:#6b6560">Coefficiente</th>';
  h+='</tr></thead><tbody>';
  rows.forEach(function(r,idx){
    var isInfLow=(r.from==null||r.from<=-9999||r.from===-Infinity);
    var isInfHi=(r.to==null||r.to>=9999||r.to===Infinity);
    h+='<tr style="background:'+(idx%2?'#faf9f7':'#fff')+'">';
    // From cell
    if(isInfLow){
      h+='<td style="padding:4px 8px;text-align:center;color:#a09a92;font-style:italic">&minus;&infin;</td>';
    }else{
      // Inventario: converti raw→% per il display nell'input (es. -0.005 → -0.50)
      var fVal=isInv?Math.round(r.from*10000)/100:r.from;
      h+='<td style="padding:3px 6px;text-align:center"><input class="cfg-input seas-molt-from" style="width:68px;text-align:center" type="number" data-tbl="'+tblKey+'" data-idx="'+idx+'" data-fld="from" value="'+fVal+'" step="'+(isInv?'0.01':'0.1')+'"></td>';
    }
    // To cell
    if(isInfHi){
      h+='<td style="padding:4px 8px;text-align:center;color:#a09a92;font-style:italic">+&infin;</td>';
    }else{
      var tVal=isInv?Math.round(r.to*10000)/100:r.to;
      h+='<td style="padding:3px 6px;text-align:center"><input class="cfg-input seas-molt-to" style="width:68px;text-align:center" type="number" data-tbl="'+tblKey+'" data-idx="'+idx+'" data-fld="to" value="'+tVal+'" step="'+(isInv?'0.01':'0.1')+'"></td>';
    }
    h+='<td style="padding:4px 10px;text-align:center"><input class="cfg-input seas-molt-coeff" style="width:65px;text-align:center;font-weight:700;color:'+(r.coeff===0?'#c0392b':r.coeff>=1.3?'#2d7a3a':'#2c2925')+'" type="number" data-tbl="'+tblKey+'" data-idx="'+idx+'" value="'+r.coeff+'" step="0.05" min="0" max="3"></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

function rCSeasMid(){
  var isP=MODE==="preventivo";
  var smvsm=E.filter(function(e){return isSMVSM(e);});
  smvsm.sort(function(a,b){
    var sa=Number(a.si)||0,sb=Number(b.si)||0;
    if(sa!==sb)return sa-sb;
    return (a.m||'').localeCompare(b.m||'');
  });

  // Apply filters
  var fl=smvsm.filter(function(e){
    if(_seasF.s!=='ALL'&&e.s!==_seasF.s)return false;
    if(_seasF.j!=='ALL'&&(e.f||e.j)!==_seasF.j)return false;
    if(_seasF.q){var q=_seasF.q.toLowerCase();
      return(e.c&&e.c.toLowerCase().indexOf(q)>=0)||(e.n&&e.n.toLowerCase().indexOf(q)>=0)||(e.m&&e.m.toLowerCase().indexOf(q)>=0)||(e.s&&e.s.toLowerCase().indexOf(q)>=0);}
    return true;
  });

  var grandTotal=0;
  smvsm.forEach(function(e){
    if(SEAS[e.m]&&SEAS[e.m].excluded)return;
    grandTotal+=calcMidSeason(e)*(e.ex||1);
  });

  var uSeas=['ALL'],uSeasJ=['ALL'];

    if(uSeas.indexOf(e.s)<0)uSeas.push(e.s);

  h+='</select><select id="seasS">';

  h+='</select>';
  h+='<span style="font-size:11px;color:#8a8680">'+fl.length+' SM/VSM &middot; Tot mid-season: <b style="color:#c9a96e">'+fc(grandTotal,'EUR')+'</b></span></div>';

  // KPI set (senza inventario — acc non escluso per ora)

  h+='<div class="scroll-wrap"><table id="stbl"><thead><tr>';
  h+='<th data-col="m">Matr.</th>';
  h+='<th data-col="c">Cognome</th>';
  h+='<th data-col="n">Nome</th>';
  h+='<th data-col="s">Negozio</th>';

  // Sbarramento columns
  h+='<th style="text-align:center;white-space:nowrap;color:#c9a96e">Sbarra.<br><span style="font-weight:400;font-size:9px">Fat+CR</span></th>';

// === rCSeasonal: Calcolo Premi in modalit\u00e0 Seasonal ===
var _seasF={q:'',s:'ALL',j:'ALL'};
function rCSeasonal(){
  if(SEASON_PERIOD==="mid"){rCSeasMid();return;}
  var isP=MODE==="preventivo";
  var smvsm=E.filter(function(e){return isSMVSM(e);});
  smvsm.sort(function(a,b){
    var sa=Number(a.si)||0,sb=Number(b.si)||0;
    if(sa!==sb)return sa-sb;
    return (a.m||'').localeCompare(b.m||'');
  });

  function calcSeasonalRow(e){
    // Dept stores internazionali: BDG×6 + QTY (50% di BDG×6)
    if(isD(e.si)){
      var bdg6=Math.round((e.ib||0)*6*100)/100;
      var qty6=Math.round(bdg6*0.5*100)/100;
      return {isDept:true,bdg6:bdg6,qty6:qty6,val:Math.round((bdg6+qty6)*100)/100,kpiScore:1,m1:1,m2:1,auto:null};
    }
    var rlSem=(e.rl||0)*6;
    var base=rlSem*SEAS_CFG.basePct;
    var kpiSet=seasGetKpiSet(e);
    var kpiScore=0;
    var auto=(!isP)?seasAutoData(e):null;
    if(isP){kpiSet.forEach(function(kdef){if(!seasKpiActive(kdef.k,e))return;kpiScore+=kdef.weight;});}
    else{kpiSet.forEach(function(kdef){if(!seasKpiActive(kdef.k,e))return;if(seasIsKpiAchieved(kdef,auto))kpiScore+=kdef.weight;});}
    var m1=isP?seasMoltTurnover(3.01):seasMoltTurnover(auto?auto.scost:0);
    var m2=isP?seasMoltInventarioV(0):seasMoltInventarioV(auto?auto.inv:0);
    return {isDept:false,kpiScore:kpiScore,m1:m1,m2:m2,auto:auto,val:Math.round(base*kpiScore*m1*m2*100)/100};
  }

  var grandTotal=0;
  smvsm.forEach(function(e){
    if(SEAS[e.m]&&SEAS[e.m].excluded)return;
    grandTotal+=calcSeasonalRow(e).val*(e.ex||1);
  });

  // Build unique store/role lists for filters
  var uSeas=['ALL'],uSeasJ=['ALL'];
  smvsm.forEach(function(e){
    if(uSeas.indexOf(e.s)<0)uSeas.push(e.s);
    var jj=e.f||e.j;if(uSeasJ.indexOf(jj)<0)uSeasJ.push(jj);
  });

  // Apply filters
  var fl=smvsm.filter(function(e){
    if(_seasF.s!=='ALL'&&e.s!==_seasF.s)return false;
    if(_seasF.j!=='ALL'&&(e.f||e.j)!==_seasF.j)return false;
    if(_seasF.q){var q=_seasF.q.toLowerCase();
      return(e.c&&e.c.toLowerCase().indexOf(q)>=0)||(e.n&&e.n.toLowerCase().indexOf(q)>=0)||(e.m&&e.m.toLowerCase().indexOf(q)>=0)||(e.s&&e.s.toLowerCase().indexOf(q)>=0);}
    return true;
  });

  var h='<button class="exp-btn" onclick="exportSeasonalExcel()" style="font-size:10px;padding:4px 12px;margin-bottom:8px">&#128202; Export Excel</button>';
  h+='<div class="flt"><input placeholder="Cerca..." id="seasQ" value="'+esc(_seasF.q)+'">';
  h+='<select id="seasJ">';
  uSeasJ.forEach(function(j){h+='<option value="'+esc(j)+'"'+(_seasF.j===j?' selected':'')+'>'+(j==='ALL'?'Tutti i ruoli':esc(j))+'</option>';});
  h+='</select><select id="seasS">';
  uSeas.forEach(function(s){h+='<option value="'+esc(s)+'"'+(_seasF.s===s?' selected':'')+'>'+(s==='ALL'?'Tutti i negozi':esc(s))+'</option>';});
  h+='</select>';
  h+='<span style="font-size:11px;color:#8a8680">'+fl.length+' SM/VSM &middot; Tot stima: <b style="color:#c9a96e">'+fc(grandTotal,'EUR')+'</b></span></div>';

  h+='<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;padding:8px 12px;background:#f5f2ee;border-radius:6px;font-size:10px;color:#6b6560">';

// === JOB TITLE PARSER: take first recognized role from cell ===
function normalizeJob(raw){
  if(!raw)return{j:"SA",f:"SA"};
  var s=String(raw).toUpperCase().trim();
  // Match roles in priority order (longest first to avoid partial matches)
  var roles=["SSAP","SSA","SCS","VSM","SM","JSA","SA"];
  var f="SA";
  for(var i=0;i<roles.length;i++){
    // Match as whole word or at start: "SCS/SA" -> SCS, "SM / Visual" -> SM
    var rx=new RegExp("\\b"+roles[i]+"\\b");
    if(rx.test(s)){f=roles[i];break}
  }
  // j = f (modifiers DEPT/NO SAS/NO DIGITAL are applied by store settings)
  return{j:f,f:f};
}

// Parse number from string, handling thousand separators (1,234.56 or 1.234,56)
function parseNum(s){
  if(typeof s==="number")return s;
  s=String(s||"0").trim().replace(/[^\d.,\-]/g,"");
  if(!s||s==="0")return 0;
  // If both . and , present: last one is decimal separator
  var lastDot=s.lastIndexOf("."),lastComma=s.lastIndexOf(",");
  if(lastDot>=0&&lastComma>=0){
    if(lastComma>lastDot){s=s.replace(/\./g,"").replace(",",".")}// 1.234,56 -> 1234.56
    else{s=s.replace(/,/g,"")}// 1,234.56 -> 1234.56
  }else if(lastComma>=0){
    // Only comma: check if it's thousands (1,000) or decimal (1,5)
    var parts=s.split(",");
    if(parts.length===2&&parts[1].length===3)s=s.replace(",","");// 2,900 -> 2900
    else s=s.replace(",",".");// 1,5 -> 1.5
  }
  return parseFloat(s)||0;
}

// Fixed columns: A(0)=Id Empl, C(2)=Ente, E(4)=Store, F(5)=Store Name, G(6)=Cognome, H(7)=Nome
// I(8)=Job Title, J(9)=Salary, K(10)=Budget, P(15)=Data inizio rapporto, O(14)=Status, W(22)=Email
function loadAnagraficaExcel(file){
  var reader=new FileReader();
  reader.onload=function(ev){setTimeout(function(){
    try{
      var data=new Uint8Array(ev.target.result);
      var wb=XLSX.read(data,{type:"array",cellDates:true});
      // Find best sheet
      var sheet=null;
      var hints=["db","anagrafica","dipendenti","employees","personale","master"];
      wb.SheetNames.forEach(function(sn){
        var snl=sn.toLowerCase();
        if(!sheet){hints.forEach(function(h){if(snl.indexOf(h)>=0)sheet=sn})}
      });
      if(!sheet)sheet=wb.SheetNames[0];

      var ws=wb.Sheets[sheet];
      var json=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
      if(json.length<2){alert("Foglio vuoto.");return}

      // Find header row
      var hdrRow=0;
      for(var ri=0;ri<Math.min(5,json.length);ri++){
        var row=json[ri];if(!row)continue;
        var rowStr=row.map(function(c){return String(c||"").toLowerCase()}).join("|");
        if(rowStr.indexOf("cognome")>=0||rowStr.indexOf("id empl")>=0){hdrRow=ri;break}
      }

      // Hire date cutoff: last day of month BEFORE CFG_MONTH/CFG_YEAR (shared by both Italia and International)
      var cutM=CFG_MONTH-1,cutY=CFG_YEAR;
      if(cutM===0){cutM=12;cutY--}
      var cutoffDate=new Date(cutY,cutM,0);
      var cutoffStr=cutoffDate.toISOString().slice(0,10);

      // Parse date from various formats
      function parseHireDate(val){
        if(!val)return null;
        if(val instanceof Date)return val;
        var s=String(val).trim();
        s=s.replace(/\s*tbc\s*/gi,"").replace(/\?+/g,"").replace(/…+/g,"").replace(/\.{3,}/g,"").trim();
        if(!s)return null;
        var m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
        if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
        m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
        if(m)return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
        m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
        if(m&&parseInt(m[1])>12)return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
        return null;
      }

      // === ITALIA / ZUCCHETTI IMPORT ===
      if(REGION==="italia"){
        // Zucchetti columns (0-based): C(2)=Matricola, D(3)=Cognome, E(4)=Nome, N(13)=Job Title
        // O(14)=Gross Salary, P(15)=BDG lordo, Y(24)=CdC, Z(25)=CdC desc,
        // AY(50)=fallback BDG, CM(90)=Codice Fiscale, DG(110)=Email
        var ZC={matr:2,cogn:3,nome:4,hire:7,term:8,job:13,gross:14,bdg:15,cdc:24,cdcDesc:25,bdgFb:50,cf:90,email:110};
        // Valid base job codes from incentive plan
        var validBaseJobs=PRIZE_MODE==="seasonal"?["SM","VSM"]:["SM","VSM","SSA","SSAP","SA","JSA","SCS"];
        function isValidJob(code){
          if(!code)return false;
          var up=String(code).toUpperCase().trim();
          for(var i=0;i<validBaseJobs.length;i++){if(up===validBaseJobs[i])return true}
          return false;
        }
        var itImported=[],itErrors=[];
        for(var ri=hdrRow+1;ri<json.length;ri++){
          var row=json[ri];if(!row)continue;
          // Matricola — pad to 7 chars with leading zeros
          var rawMatr=String(row[ZC.matr]||"").trim();
          if(!rawMatr)continue;
          rawMatr=rawMatr.replace(/[^0-9]/g,"");
          if(!rawMatr){itErrors.push({row:ri+1,name:"",reason:"Matricola non valida: "+row[ZC.matr]});continue}
          var matricola=rawMatr.padStart(7,"0");

          var cognome=String(row[ZC.cogn]||"").trim().toUpperCase();
          var nome=String(row[ZC.nome]||"").trim().toUpperCase();
          var fullName=cognome+" "+nome;
          if(!cognome&&!nome)continue;

          // Cessazione (Col I): se valorizzata = cessato/dimesso -> escludi
          var termRaw=row[ZC.term];
          if(termRaw!=null&&String(termRaw).trim()!==""){
            var termDate=parseHireDate(termRaw);
            var termStr=termDate?termDate.toISOString().slice(0,10):String(termRaw);
            itErrors.push({row:ri+1,name:fullName,reason:"Cessato/dimesso il "+termStr});
            continue;
          }

          // Data assunzione (Col H): deve essere <= cutoffDate
          var hireDateRaw=row[ZC.hire];
          var hireDate=parseHireDate(hireDateRaw);
          if(hireDate&&hireDate>cutoffDate){
            var hdStr=hireDate.toISOString().slice(0,10);

          }
          if(!hireDate&&hireDateRaw){
            itErrors.push({row:ri+1,name:fullName,reason:"Data assunzione non leggibile: "+hireDateRaw});

          }

          // Job title — filter: only valid plan jobs
          var rawJob=String(row[ZC.job]||"").trim().toUpperCase();
          if(!isValidJob(rawJob)){
            itErrors.push({row:ri+1,name:fullName,reason:"Job title '"+rawJob+"' non previsto nel piano incentivi (validi: "+validBaseJobs.join(", ")+")"});

            si:!isNaN(cdcNum)?cdcNum:cdcRaw,

            j:rawJob,f:rawJob,
            rl:grossSal||0,ib:bdgVal||0,
            fc:"",en:210,// Italia = ente 210
            rb:0,rbn:0,rd:0,rs:0,rp:0,rsa:0,rdc:0,rcs:0,ra:0,
            ml:0,vi:0,tl:0,tn:0,sc:0,il:0,
            ps:"NO",dv:0,md:0,pq:0,
            cu:"EUR",ex:1,
            mp:email,mf:"",

          };

        }
        showImportReport(itImported,itErrors,sheet,file.name,cutoffStr);

        var row=json[ri];if(!row)continue;
        var cdc=row[4];if(!cdc)continue;// Col E = store

}

// ── IMPORT ANAGRAFICA USA (formato Estrazione_Piantoni) ─────────────────────
function loadAnagraficaUSA(file){
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var wb=XLSX.read(ev.target.result,{type:"array"});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      if(!rows||rows.length<2){alert("File USA vuoto o non leggibile.");return;}

      var imported=[],skipped=0,added=0;
      var newStores={}; // si -> store name

      for(var i=1;i<rows.length;i++){
        var r=rows[i];
        if(!r||!r[0])continue;

        var si=String(r[0]||"").trim();
        var storeName=String(r[1]||"").trim();
        var nome=String(r[2]||"").trim();
        var cognome=String(r[3]||"").trim();
        var jt=String(r[4]||"").trim();
        var cm=parseFloat(r[6])||0;            // col G (idx 6) = % commissione
        var storeType=String(r[8]||"").trim(); // col I (idx 8) = tipo negozio

        // Escludi righe con commissione 0
        if(!cm||cm<=0){skipped++;continue;}
        // Escludi righe senza store o nome
        if(!si||!nome){skipped++;continue;}

        // Dept Stores: useStore override a prescindere dal job
        var isDept=(storeType.toLowerCase().indexOf("dept")>=0);

        // Matricola sintetica: storeID + cognome + nome (no spazi)
        var matricola="US"+si+"_"+cognome.replace(/\s/g,"").substring(0,6)+"_"+nome.replace(/\s/g,"").substring(0,4);

        // Determina funzione normalizzata
        var fNorm=jt.replace(/\s+/g,"").toUpperCase();
        if(fNorm.indexOf("SM")>=0&&fNorm.indexOf("VSM")<0&&fNorm.indexOf("STOCK")<0&&fNorm.indexOf("ATOCK")<0)fNorm="SM";
        else if(fNorm.indexOf("VSM")>=0&&fNorm.indexOf("STOCK")<0&&fNorm.indexOf("ATOCK")<0)fNorm="VSM";
        else if(fNorm.indexOf("SSAP")>=0)fNorm="SSAP";
        else if(fNorm.indexOf("SSA")>=0)fNorm="SSA";
        else if(fNorm.indexOf("JSA")>=0)fNorm="JSA";
        else if(fNorm.indexOf("SCS")>=0)fNorm="SCS";
        else if(fNorm.indexOf("STOCK")>=0||fNorm.indexOf("ATOCK")>=0)fNorm="STK"; // STOCK/ATOCK → STK
        else if(fNorm.indexOf("SA")>=0)fNorm="SA";
        else fNorm="SA"; // default

        var emp={
          si:Number(si),
          s:(String(si)+" "+(storeName||"STORE "+si)).toUpperCase(),
          m:matricola,
          n:nome,
          c:cognome,
          j:jt,
          f:fNorm,
          rl:0,          // salary non disponibile in questo formato
          ib:0,          // budget non disponibile
          cu:"USD",
          ex:0.9, // 1 USD = 0.90 EUR (fixed rate)
          ml:0,
          vi:0,
          tl:0,
          tn:0,
          ps:"NO",       // USA employees: premio attivo di default
          fc:"OLJAY KUSH",
          en:241,        // ente USA
          rb:0,rbn:0,rd:0,rs:0,rp:0,rsa:0,rdc:0,rcs:0,ra:0,sc:0,il:0,dv:0,md:0,pq:0
        };

        newStores[si]=storeName;

        // Flag dept store in STORE_FLAGS (per la logica USA dept è useStore a prescindere dal job)
        if(isDept){
          if(!STORE_FLAGS[si])STORE_FLAGS[si]={};
          STORE_FLAGS[si].dept=true;
          STORE_FLAGS[si].usaDept=true; // flag distinto per logica USA dept
        }

        // Aggiorna/crea record in D.usa con la commissione
        if(!D.usa)D.usa={};
        D.usa[matricola]={
          cm:cm,
          ps:0,   // personal sales (da caricare a consuntivo)
          st:0,   // store turnover (da caricare)
          sb:0,   // store budget hit
          tp:0,   // total prize
          isDept:isDept  // flag dept store
        };

        // Se Dept Store: forza useStore=true nella configurazione USA_P per questo job
        // (già gestito globalmente dalla configurazione, ma salviamo il flag per riferimento)

        imported.push(emp);
        added++;
      }

      if(!added){
        alert("Nessun dipendente USA importato (tutte le righe hanno commissione 0 o dati mancanti).\nRighe scartate: "+skipped);
        return;
      }

      // Salva pending (NON modifica E ancora — aspetta conferma "Applica")
      window._pendingImportUSA=imported;
      window._pendingNewStoresUSA=newStores;
      window._pendingSkippedUSA=skipped;
      window._pendingFileUSA=file.name;

      // Mostra report nel div scanResults (come anagrafica standard)
      var storeList=Object.keys(newStores).map(function(si){return si+" "+newStores[si];}).join(", ");
      var repH='<div class="wg" style="margin-top:16px"><div class="wg-title">&#127482;&#127480; Report Importazione Anagrafica USA</div>';
      repH+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">';
      repH+='<span style="background:#d4edda;color:#155724;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700">✓ '+added+' dipendenti importati</span>';
      if(skipped>0)repH+='<span style="background:#fff3cd;color:#856404;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700">⚠ '+skipped+' righe escluse (cm=0)</span>';
      repH+='</div>';
      repH+='<div style="font-size:10px;color:#6b6560;margin-bottom:8px">Store USA rilevati: <b>'+storeList+'</b></div>';
      repH+='<table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:10px"><thead><tr style="background:#2c2925;color:#f5f4f1"><th style="padding:4px 8px;text-align:left">Matricola</th><th style="padding:4px 8px;text-align:left">Nome</th><th style="padding:4px 8px;text-align:left">Negozio</th><th style="padding:4px 8px;text-align:left">Ruolo</th><th style="padding:4px 8px;text-align:right">Comm%</th><th style="padding:4px 8px;text-align:center">Dept</th></tr></thead><tbody>';
      imported.forEach(function(emp,i){
        var ud=D.usa&&D.usa[emp.m]||{};
        repH+='<tr style="background:'+(i%2?'#faf9f7':'#fff')+'"><td style="padding:3px 8px;font-family:monospace">'+esc(emp.m)+'</td><td style="padding:3px 8px">'+esc(emp.n)+' '+esc(emp.c)+'</td><td style="padding:3px 8px">'+esc(emp.s)+'</td><td style="padding:3px 8px">'+esc(emp.f)+'</td><td style="padding:3px 8px;text-align:right">'+((ud.cm||0)*100).toFixed(2)+'%</td><td style="padding:3px 8px;text-align:center">'+(ud.isDept?'✓':'—')+'</td></tr>';
      });
      repH+='</tbody></table>';
      repH+='<div style="display:flex;gap:8px"><button class="exp-btn primary" onclick="applyImportedUSAAnagrafica()">✓ Applica '+added+' dipendenti USA</button>';
      repH+='<button class="exp-btn" onclick="downloadUSAImportLog()">⬇ Scarica Log</button></div></div>';
      rSources(); // Ricostruisce il tab (incluso scanResults vuoto)
      var el=document.getElementById("scanResults");
      if(el)el.innerHTML=repH; // Ora mostra il report nel div appena ricreato
    }catch(ex){
      alert("Errore importazione anagrafica USA: "+ex.message);
      console.error(ex);
    }
  };
  reader.readAsArrayBuffer(file);
}

function applyImportedUSAAnagrafica(){
  var imported=window._pendingImportUSA;
  var newStores=window._pendingNewStoresUSA||{};
  if(!imported||!imported.length){alert("Nessun dato da applicare.");return;}
  if(!confirm("Aggiungere/sostituire "+imported.length+" dipendenti USA?\n\nI dipendenti non-USA rimarranno invariati."))return;
  // Applica stores
  Object.keys(newStores).forEach(function(si){var n=Number(si);if(USA_STORES.indexOf(n)<0)USA_STORES.push(n);});
  D.us=USA_STORES.slice();
  // Applica dipendenti
  var nonUSA=E.filter(function(e){return e.cu!=="USD";});
  E.length=0;nonUSA.forEach(function(e){E.push(e);});imported.forEach(function(e){E.push(e);});
  D.e=E;
  updateHeaderCount();
  window._pendingImportUSA=null;
  window._pendingNewStoresUSA=null;
  var el=document.getElementById("scanResults");if(el)el.innerHTML="";
  rC();rA();rSources();rAgg();autoSave();
  alert("\u2705 Anagrafica USA applicata: "+imported.length+" dipendenti USA aggiornati.");
}
